<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>80s Nostalgia</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="../script.js" defer></script>
</head>
<body class="page3">
    <main class="page-content">
        <h1>80s Nostalgia</h1>
        <p class="page3-lead">MTV-era hits and looks — embedded straight from YouTube.</p>

        <section class="page3-media" aria-label="1980s video clips">
            <h2 class="page3-media-title">On the air</h2>

            <div class="page3-embed">
                <p class="page3-embed-label">A-ha — “Take On Me” (1985)</p>
                <div class="page3-embed-frame">
                    <iframe
                        src="https://www.youtube.com/embed/djV11Xbc914"
                        title="A-ha Take On Me official video"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        allowfullscreen
                        loading="lazy"
                    ></iframe>
                </div>
            </div>

            <div class="page3-embed">
                <p class="page3-embed-label">Michael Jackson — “Billie Jean” (1983)</p>
                <div class="page3-embed-frame">
                    <iframe
                        src="https://www.youtube.com/embed/Zi_XLOBDo_Y"
                        title="Michael Jackson Billie Jean Motown 25"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        allowfullscreen
                        loading="lazy"
                    ></iframe>
                </div>
            </div>
        </section>

        <div class="back-row">
            <a class="link" href="../index.html">Back to home</a>
        </div>
    </main>
</body>
</html>
