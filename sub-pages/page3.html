<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click On Things</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="../script.js" defer></script>
</head>
<body class="page3">
    <main class="page-content page3-content">
        <h1>Click On Things</h1>
        <p>Click the photo to switch to the animated image (GIF or motion file).</p>
        <figure class="page3-photo-frame">
            <img
                id="page3-photo"
                class="page3-photo"
                src="../images/page3-static.png"
                data-static="../images/page3-static.png"
                data-animated="../images/page3-animated.png"
                alt="Friends laughing together on a lawn in front of a brick building"
            >
        </figure>
        <p class="page3-photo-caption">Click the picture again to return to the still photo.</p>
        <div class="back-row">
            <a class="link" href="../index.html">Back to home</a>
        </div>
    </main>
</body>
</html>
