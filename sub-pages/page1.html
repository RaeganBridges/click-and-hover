<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 1</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="../script.js" defer></script>
</head>
<body class="page1-sky">
    <main class="page-content page1-content">
        <h1>Page 1</h1>
        <p>This is the first page.</p>

        <section class="sky-toys" aria-labelledby="sky-toys-title">
            <h2 id="sky-toys-title" class="sky-toys-title">Stars and planets</h2>
            <div class="sky-controls">
                <button type="button" id="add-box-btn" class="toggle-btn">Add star or planet</button>
                <button type="button" id="subtract-box-btn" class="toggle-btn" disabled>Remove last</button>
            </div>
            <div id="float-box-row" class="float-box-row sky-row" aria-live="polite"></div>
        </section>

        <div class="back-row">
            <a class="link" href="../index.html">Back to home</a>
        </div>
    </main>
</body>
</html>
